<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Access Aarush Hospital Management - Login or Create an account.">
  <title>Aarush Hospital – Access</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .auth-tabs {
      display: inline-flex;
      background: var(--color-soft);
      padding: 0.375rem;
      border-radius: var(--radius-md);
      margin-bottom: 2.5rem;
      position: relative;
      width: 100%;
    }
    .auth-tab {
      flex: 1;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--color-muted);
      padding: 0.625rem;
      text-align: center;
      transition: color 0.3s;
      border-radius: calc(var(--radius-md) - 0.25rem);
      z-index: 2;
      user-select: none;
    }
    .auth-tab.active {
      color: var(--color-black);
    }
    .auth-tab-indicator {
      position: absolute;
      top: 0.375rem;
      bottom: 0.375rem;
      left: 0.375rem;
      width: calc(50% - 0.375rem);
      background: var(--color-white);
      border-radius: calc(var(--radius-md) - 0.25rem);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
    }
    .tab-register-active .auth-tab-indicator {
      transform: translateX(100%);
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="glass-panel"
      style="width: 100%; max-width: 30rem; padding: 3rem; position: relative; overflow: hidden;">
      <!-- Subtle top glow -->
      <div
        style="position: absolute; top: -50px; left: 50%; transform: translateX(-50%); width: 200px; height: 100px; background: var(--color-accent); filter: blur(80px); opacity: 0.1; pointer-events: none;">
      </div>


      <!-- Tabs -->
      <div class="auth-tabs" id="tabs-container">
        <div class="auth-tab-indicator"></div>
        <div class="auth-tab active" id="tab-login" onclick="switchMode('login')">Sign In</div>
        <div class="auth-tab" id="tab-register" onclick="switchMode('register')">Register</div>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="space-y-5">

        <label class="block">
          <span class="field-label">Email</span>
          <input class="field-input" type="email" name="email" placeholder="you@hospital.com" required>
        </label>
        <label class="block">
          <span class="field-label">Password</span>
          <input class="field-input" type="password" name="password" placeholder="Enter your password" required>
        </label>
        <div id="login-alert"></div>
        <button type="submit" class="btn-primary w-full" id="login-btn">Sign in</button>
      </form>

      <!-- Register Form (Hidden by default) -->
      <form id="register-form" class="space-y-5 hidden">
        <!-- Role is hidden and hardcoded to patient -->
        <input type="hidden" name="role" value="patient">

        <div class="grid gap-5 sm-grid-2">
          <label class="block">
            <span class="field-label">Email</span>
            <input class="field-input" type="email" name="email" placeholder="you@hospital.com" required>
          </label>
          <label class="block">
            <span class="field-label">Password</span>
            <input class="field-input" type="password" name="password" placeholder="Min. 8 chars" required>
          </label>
        </div>

        <div class="grid gap-5 sm-grid-2">
          <label class="block">
            <span class="field-label">Patient name</span>
            <input class="field-input" name="name" placeholder="Full name" required>
          </label>
          <label class="block">
            <span class="field-label">Phone</span>
            <input class="field-input" name="phone" placeholder="+91..." required>
          </label>
        </div>

        <div class="grid gap-5 sm-grid-2">
          <label class="block">
            <span class="field-label">Age</span>
            <input class="field-input" type="number" name="age" min="0" max="120" required>
          </label>
          <label class="block">
            <span class="field-label">Gender</span>
            <select class="field-input" name="gender">
              <option value="female">Female</option>
              <option value="male">Male</option>
              <option value="other">Other</option>
            </select>
          </label>
        </div>
        <label class="block">
          <span class="field-label">Address</span>
          <input class="field-input" name="address" placeholder="Street, city, locality" required>
        </label>

        <div id="register-alert"></div>
        <button type="submit" class="btn-primary w-full" id="register-btn">Create account</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    /* ── Switching Logic ── */
    function switchMode(mode) {
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');
      const tabsContainer = document.getElementById('tabs-container');

      if (mode === 'login') {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        tabsContainer.classList.remove('tab-register-active');
      } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        tabLogin.classList.remove('active');
        tabRegister.classList.add('active');
        tabsContainer.classList.add('tab-register-active');
      }
    }

    /* ── Form Handling ── */
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const data = await auth.login({ email: loginForm.email.value, password: loginForm.password.value });
        window.location.href = getDefaultRouteForRole(data.user.role);
      } catch (err) {
        showAlert('login-alert', err.data?.message || 'Unable to sign in.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      const fd = new FormData(registerForm);
      const payload = Object.fromEntries(fd.entries());
      if (payload.role === 'patient') payload.age = Number(payload.age);

      try {
        const data = await auth.register(payload);
        window.location.href = getDefaultRouteForRole(data.user.role);
      } catch (err) {
        const details = err.data?.details?.join(' ');
        showAlert('register-alert', details || err.data?.message || 'Unable to register.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });

    // Auto-switch based on URL hash if provided
    if (window.location.hash === '#register') switchMode('register');
  </script>
</body>

</html>
