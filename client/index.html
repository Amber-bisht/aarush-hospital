<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HMS Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="loading-screen">
    <div class="glass-panel loading-card">
      <div class="loading-dot"><div class="loading-dot-inner"></div></div>
      <h2 class="text-xl font-bold">Hospital Management System</h2>
      <p class="mt-2 text-sm text-muted">Loading your workspace...</p>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Redirect based on auth state
    if (auth.isAuthenticated()) {
      window.location.replace(getDefaultRouteForRole(auth.getUser().role));
    } else {
      window.location.replace('/login.html');
    }
  </script>
</body>
</html>
