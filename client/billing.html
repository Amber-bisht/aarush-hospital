<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate appointment-linked bills and manage payments.">
  <title>Billing – Aarush Hospital</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app"></div>

  <!-- Create Bill Modal -->
  <div id="create-bill-modal" class="modal-overlay hidden">
    <div class="glass-panel modal-panel">
      <div class="modal-header">
        <div>
          <h3 class="modal-title">Generate bill</h3>
          <p class="modal-desc">Create a new bill tied to an appointment.</p>
        </div>
        <button class="modal-close" onclick="closeModal('create-bill-modal')">Close</button>
      </div>
      <form id="bill-form" class="space-y-5">
        <label class="block">
          <span class="field-label">Patient</span>
          <select class="field-input" name="patient_id" id="bill-patient-select" required>
            <option value="">Select patient</option>
          </select>
        </label>
        <label class="block">
          <span class="field-label">Appointment</span>
          <select class="field-input" name="appointment_id" id="bill-appt-select" required>
            <option value="">Select appointment</option>
          </select>
        </label>
        <label class="block">
          <span class="field-label">Amount</span>
          <input class="field-input" type="number" name="amount" placeholder="2500" required>
        </label>
        <button type="submit" class="btn-primary w-full">Create bill</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/app-shell.js"></script>
  <script src="/js/billing.js"></script>
</body>
</html>
