<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a new account on Aarush Hospital Management.">
  <title>Register – Aarush Hospital</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="register-grid">
    <div class="register-inner">
      <!-- Left info panel -->
      <section class="glass-panel" style="padding: 2rem 2.5rem;">
        <p class="text-sm font-semibold uppercase tracking-widest text-accent">Create Account</p>
        <h1 class="mt-4 text-4xl font-extrabold tracking-tight text-black">Start with a tailored role.</h1>
        <p class="mt-4 text-sm text-muted" style="line-height: 1.75;">
          Patients get self-service visibility, doctors get appointment and prescription
          workflows, and admins get the full command center.
        </p>
        <p class="mt-8 text-sm text-muted">
          Already registered? <a href="/login.html" class="font-semibold text-accent">Sign in</a>
        </p>
      </section>

      <!-- Right form panel -->
      <section class="glass-panel" style="padding: 2rem 2.5rem;">
        <form id="register-form" class="space-y-5">
          <!-- Role -->
          <label class="block">
            <span class="field-label">Role</span>
            <select class="field-input" name="role" id="reg-role">
              <option value="patient">Patient</option>
              <option value="doctor">Doctor</option>
              <option value="admin">Admin</option>
            </select>
          </label>

          <!-- Email + Password -->
          <div class="grid gap-5 sm-grid-2">
            <label class="block">
              <span class="field-label">Email</span>
              <input class="field-input" type="email" name="email" placeholder="you@hospital.com" required>
            </label>
            <label class="block">
              <span class="field-label">Password</span>
              <input class="field-input" type="password" name="password" placeholder="Minimum 8 chars" required>
            </label>
          </div>

          <!-- Name + Phone (patient & doctor) -->
          <div id="name-phone-group" class="grid gap-5 sm-grid-2">
            <label class="block">
              <span class="field-label" id="name-label">Patient name</span>
              <input class="field-input" name="name" placeholder="Full name" required>
            </label>
            <label class="block">
              <span class="field-label">Phone</span>
              <input class="field-input" name="phone" placeholder="+91..." required>
            </label>
          </div>

          <!-- Patient-only fields -->
          <div id="patient-fields">
            <div class="grid gap-5 sm-grid-2">
              <label class="block">
                <span class="field-label">Age</span>
                <input class="field-input" type="number" name="age" required>
              </label>
              <label class="block">
                <span class="field-label">Gender</span>
                <select class="field-input" name="gender">
                  <option value="female">Female</option>
                  <option value="male">Male</option>
                  <option value="other">Other</option>
                </select>
              </label>
            </div>
            <label class="block mt-4">
              <span class="field-label">Address</span>
              <input class="field-input" name="address" placeholder="Street, city, locality" required>
            </label>
          </div>

          <!-- Doctor-only fields -->
          <div id="doctor-fields" class="hidden">
            <label class="block">
              <span class="field-label">Specialization</span>
              <input class="field-input" name="specialization" placeholder="Cardiology">
            </label>
          </div>

          <div id="register-alert"></div>

          <button type="submit" class="btn-primary w-full" id="register-btn">Create account</button>
        </form>
      </section>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
